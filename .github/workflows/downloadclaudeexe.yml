name: Download and Extract claude.exe.zst

on:
  workflow_dispatch:

jobs:
  download-and-extract:
    runs-on: windows-latest

    steps:
      - name: Download zstd executable directly
        shell: pwsh
        run: |
          Write-Host "📦 下载 zstd 工具..."
          $zstdUrl = "https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-v1.5.6-win64.zip"
          Invoke-WebRequest -Uri $zstdUrl -OutFile "zstd.zip"
          Expand-Archive -Path "zstd.zip" -DestinationPath "zstd"
          # 查看解压后的目录结构，确认 zstd.exe 的实际位置
          Get-ChildItem -Path "zstd" -Recurse
          # 将 zstd.exe 所在目录添加到环境变量 PATH
          $zstdDir = Get-ChildItem -Path "zstd" -Directory | Select-Object -First 1
          if ($zstdDir) {
            $env:PATH = "$($zstdDir.FullName);$env:PATH"
            Write-Host "✅ zstd 路径已添加: $($zstdDir.FullName)"
          } else {
            Write-Host "⚠️ 未找到 zstd 目录，使用当前路径"
          }

      - name: Download claude.exe.zst
        shell: pwsh
        run: |
          $url = "https://downloads.claude.ai/claude-code-releases/2.1.161/win32-x64/claude.exe.zst"
          $output = "claude.exe.zst"
          Write-Host "📥 开始下载 claude.exe.zst..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 60
          Write-Host "✅ 下载完成，文件大小: $([math]::Round((Get-Item $output).Length / 1MB, 2)) MB"

      - name: Extract claude.exe from .zst
        shell: pwsh
        run: |
          Write-Host "📦 解压 claude.exe.zst..."
          # 先找到 zstd.exe 的确切位置
          $zstdExe = Get-ChildItem -Path "zstd" -Recurse -Filter "zstd.exe" | Select-Object -First 1
          if ($zstdExe) {
            Write-Host "找到 zstd.exe: $($zstdExe.FullName)"
            # 使用完整路径执行解压
            & $zstdExe.FullName -d claude.exe.zst -o claude.exe
            Write-Host "✅ 解压完成"
          } else {
            Write-Host "⚠️ 未找到 zstd.exe"
            exit 1
          }

      - name: Check extracted file
        shell: pwsh
        run: |
          if (Test-Path "claude.exe") {
            $size = [math]::Round((Get-Item "claude.exe").Length / 1MB, 2)
            Write-Host "✅ claude.exe 解压成功，大小: $size MB"
          } else {
            Write-Host "⚠️ claude.exe 未找到"
            exit 1
          }

      - name: Package as ZIP
        shell: pwsh
        run: |
          Write-Host "📦 打包为 ZIP 文件..."
          Compress-Archive -Path "claude.exe" -DestinationPath "claude-2.1.161-win32-x64.zip" -Force
          Write-Host "✅ 打包完成"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-2.1.161-win32-x64
          path: claude-2.1.161-win32-x64.zip
          retention-days: 7
