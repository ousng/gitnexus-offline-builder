name: Download and Extract claude.exe.zst

on:
  workflow_dispatch:

jobs:
  download-and-extract:
    runs-on: windows-latest

    steps:
      - name: Download zstd executable directly
        shell: pwsh
        run: |
          Write-Host "📦 下载 zstd 工具..."
          # 从 GitHub 直接下载 zstd 的 Windows 二进制文件
          $zstdUrl = "https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-v1.5.6-win64.zip"
          Invoke-WebRequest -Uri $zstdUrl -OutFile "zstd.zip"
          Expand-Archive -Path "zstd.zip" -DestinationPath "zstd"
          # 将 zstd.exe 所在的目录添加到 PATH，方便后续调用
          $zstdPath = Join-Path (Get-Location) "zstd"
          $env:PATH = "$zstdPath;$env:PATH"
          Write-Host "✅ zstd 准备完成"

      - name: Download claude.exe.zst
        shell: pwsh
        run: |
          $url = "https://downloads.claude.ai/claude-code-releases/2.1.161/win32-x64/claude.exe.zst"
          $output = "claude.exe.zst"
          Write-Host "📥 开始下载 claude.exe.zst..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 60
          Write-Host "✅ 下载完成，文件大小: $([math]::Round((Get-Item $output).Length / 1MB, 2)) MB"

      - name: Extract claude.exe from .zst
        shell: pwsh
        run: |
          Write-Host "📦 解压 claude.exe.zst..."
          # 使用直接下载的 zstd 解压
          .\zstd\zstd.exe -d claude.exe.zst -o claude.exe
          Write-Host "✅ 解压完成，文件大小: $([math]::Round((Get-Item 'claude.exe').Length / 1MB, 2)) MB"

      - name: Package as ZIP
        shell: pwsh
        run: |
          Write-Host "📦 打包为 ZIP 文件..."
          Compress-Archive -Path "claude.exe" -DestinationPath "claude-2.1.161-win32-x64.zip" -Force
          Write-Host "✅ 打包完成"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-2.1.161-win32-x64
          path: claude-2.1.161-win32-x64.zip
          retention-days: 7
