name: Build cx_Oracle (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: oraclelinux:8    # ← 去掉 -slim
      options: --user root
    steps:
      - name: Install deps
        run: |
          dnf install -y gzip tar git-core gcc make python3.11-devel oracle-instantclient-release-el8
          dnf config-manager --enable ol8_oracle_instantclient
          dnf install -y oracle-instantclient-basic-21.22.0.0.0 oracle-instantclient-devel-21.22.0.0.0
          ldconfig

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wheel
        env:
          ORACLE_HOME: /usr/lib/oracle/21/client64
          LD_LIBRARY_PATH: /usr/lib/oracle/21/client64/lib
        run: |
          python3.11 -m pip install --upgrade pip setuptools wheel
          pip download cx_Oracle==8.3.0 --no-binary cx_Oracle --no-deps -d /tmp/src
          cd /tmp/src && tar xzf cx_Oracle-*.tar.gz && cd cx_Oracle-*
          python3.11 setup.py bdist_wheel
          mkdir -p $GITHUB_WORKSPACE/dist
          cp dist/*.whl $GITHUB_WORKSPACE/dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx_oracle_8.3.0_py311_ol8
          path: dist/*.whl
