name: Build GitNexus Offline Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'GitNexus 版本号（留空则安装最新版）'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 GitNexus 及其依赖
        run: |
          mkdir gitnexus-offline
          cd gitnexus-offline
          npm init -y
          if [ -z "${{ github.event.inputs.version }}" ]; then
            npm install gitnexus --save
          else
            npm install gitnexus@${{ github.event.inputs.version }} --save
          fi

      - name: 打包完整离线包
        run: |
          cd gitnexus-offline
          VERSION=$(node -p "require('./node_modules/gitnexus/package.json').version" 2>/dev/null || echo "latest")
          tar -czf "../gitnexus-${VERSION}-full.tar.gz" node_modules package.json package-lock.json

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gitnexus-offline-package
          path: gitnexus-*.tar.gz
          retention-days: 7
