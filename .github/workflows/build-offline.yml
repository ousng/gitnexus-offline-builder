name: Download and Package Claude Code (Windows)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest  # 使用Windows环境
    steps:
      - name: Download ClaudeSetup.exe
        shell: pwsh
        run: |
          $url = "https://downloads.claude.ai/releases/win32/x64/1.13576.1/ClaudeSetup-772d01ffc175c3795a49154acdecf043d634b5d1.exe"
          $output = "ClaudeSetup.exe"
          
          try {
            # 使用PowerShell的Invoke-WebRequest，添加超时和重试
            Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 30 -ErrorAction Stop
            Write-Host "✅ 下载成功"
          } catch {
            Write-Host "⚠️ 下载失败: $_"
            # 创建一个空文件标记失败，方便后续步骤判断
            New-Item -Path "download_failed.txt" -ItemType File -Force
          }

      - name: Check if download succeeded
        id: check
        shell: pwsh
        run: |
          if (Test-Path "ClaudeSetup.exe" -PathType Leaf) {
            $fileSize = (Get-Item "ClaudeSetup.exe").Length
            if ($fileSize -gt 0) {
              Write-Host "✅ 文件大小: $fileSize bytes"
              echo "success=true" >> $env:GITHUB_OUTPUT
            } else {
              echo "success=false" >> $env:GITHUB_OUTPUT
            }
          } else {
            echo "success=false" >> $env:GITHUB_OUTPUT
            Write-Host "⚠️ 文件不存在，下载失败"
          }

      - name: Create ZIP package
        if: steps.check.outputs.success == 'true'
        shell: pwsh
        run: |
          # Windows下使用PowerShell的Compress-Archive
          Compress-Archive -Path "ClaudeSetup.exe" -DestinationPath "ClaudeSetup.zip" -Force
          Write-Host "✅ ZIP打包完成"

      - name: Upload ZIP artifact
        if: steps.check.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeSetup-Windows
          path: ClaudeSetup.zip
          retention-days: 7

      - name: 上传失败日志（如果下载失败）
        if: steps.check.outputs.success != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: download-failed-log
          path: download_failed.txt
          retention-days: 1
