name: Run ClaudeSetup.exe and Package Installed Files

on:
  workflow_dispatch:

jobs:
  install-and-package:
    runs-on: windows-latest
    steps:
      - name: Download Bootstrapper
        shell: pwsh
        run: |
          $url = "https://downloads.claude.ai/releases/win32/x64/1.13576.1/ClaudeSetup-772d01ffc175c3795a49154acdecf043d634b5d1.exe"
          $output = "ClaudeSetup.exe"
          Write-Host "📥 下载引导程序..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 30
          Write-Host "✅ 引导程序下载完成，大小: $([math]::Round((Get-Item $output).Length/1MB, 2)) MB"

      - name: Run ClaudeSetup.exe (Full Installation)
        shell: pwsh
        run: |
          Write-Host "🚀 运行 ClaudeSetup.exe，等待完整安装..."
          
          # 运行安装程序，等待它完全退出
          # 注意：如果安装程序需要交互，可能会卡住，但先尝试默认行为
          $process = Start-Process -FilePath ".\ClaudeSetup.exe" -PassThru -Wait
          
          Write-Host "✅ 安装程序执行完毕，退出代码: $($process.ExitCode)"

      - name: Locate Installed Claude Code Directory
        id: locate
        shell: pwsh
        run: |
          # 常见安装位置
          $possiblePaths = @(
            "C:\Program Files\Claude Code",
            "C:\Program Files\Anthropic\Claude Code",
            "$env:LOCALAPPDATA\Programs\Claude Code",
            "$env:APPDATA\Claude Code",
            "$env:USERPROFILE\AppData\Local\Programs\Claude Code"
          )
          
          $foundDir = $null
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              Write-Host "✅ 找到安装目录: $path"
              $foundDir = $path
              break
            }
          }
          
          if ($foundDir) {
            echo "install_dir=$foundDir" >> $env:GITHUB_OUTPUT
            echo "success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠️ 未找到安装目录，尝试搜索整个 C 盘..."
            # 搜索最近创建的包含 "claude" 的目录
            $dirs = Get-ChildItem -Path "C:\" -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "claude" -and $_.LastWriteTime -gt (Get-Date).AddMinutes(-10) }
            if ($dirs) {
              $foundDir = $dirs[0].FullName
              Write-Host "✅ 通过搜索找到: $foundDir"
              echo "install_dir=$foundDir" >> $env:GITHUB_OUTPUT
              echo "success=true" >> $env:GITHUB_OUTPUT
            } else {
              echo "success=false" >> $env:GITHUB_OUTPUT
            }
          }

      - name: Package Installed Files
        if: steps.locate.outputs.success == 'true'
        shell: pwsh
        run: |
          $installDir = "${{ steps.locate.outputs.install_dir }}"
          Write-Host "📦 开始打包安装目录: $installDir"
          
          # 打包整个安装目录
          Compress-Archive -Path "$installDir\*" -DestinationPath "ClaudeCode_Installed.zip" -Force
          Write-Host "✅ 打包完成，大小: $([math]::Round((Get-Item 'ClaudeCode_Installed.zip').Length/1MB, 2)) MB"

      - name: Upload Packaged Install
        if: steps.locate.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCode_Installed
          path: ClaudeCode_Installed.zip
          retention-days: 7

      - name: Debug - List Recent Files (如果找不到安装目录)
        if: steps.locate.outputs.success != 'true'
        shell: pwsh
        run: |
          Write-Host "🔍 列出 C 盘最近 10 分钟创建/修改的文件和目录"
          Get-ChildItem -Path "C:\" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.LastWriteTime -gt (Get-Date).AddMinutes(-10) } |
            ForEach-Object { Write-Host "  📁 $($_.FullName)" }
          
          Get-ChildItem -Path "C:\Users\$env:USERNAME\AppData\Local\Temp" -File -ErrorAction SilentlyContinue |
            Where-Object { $_.LastWriteTime -gt (Get-Date).AddMinutes(-10) } |
            ForEach-Object { Write-Host "  📄 $($_.FullName) - $([math]::Round($_.Length/1MB, 2))MB" }
