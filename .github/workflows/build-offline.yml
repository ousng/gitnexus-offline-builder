name: Build GitNexus Portable Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'GitNexus 版本号（留空则安装最新版）'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 全局安装 GitNexus
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty("${{ github.event.inputs.version }}")) {
            npm install -g gitnexus
          } else {
            npm install -g gitnexus@${{ github.event.inputs.version }}
          }

      - name: 获取全局安装路径
        shell: pwsh
        run: |
          $npmRoot = npm root -g
          # 获取全局 bin 目录的正确方式
          $npmPrefix = npm prefix -g
          $npmBin = "$npmPrefix"
          echo "NPM_ROOT=$npmRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "NPM_BIN=$npmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "全局 node_modules: $npmRoot"
          echo "全局 bin: $npmBin"

      - name: 打包整个全局 npm 目录
        shell: pwsh
        run: |
          $version = node -p "require('$env:NPM_ROOT/gitnexus/package.json').version" 2>$null
          if (-not $version) { $version = "latest" }
          
          # 获取 npm 全局目录的父目录（包含 node_modules 和可执行文件）
          $npmDir = Split-Path $env:NPM_ROOT
          
          # 打包整个 npm 目录
          7z a -tzip "gitnexus-portable-${version}.zip" "$npmDir\*"
          
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "打包完成: gitnexus-portable-${version}.zip"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gitnexus-portable-package
          path: gitnexus-portable-*.zip
          retention-days: 7
