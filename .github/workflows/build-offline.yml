name: Download Claude Code Full Installer (Run provjobd)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest
    steps:
      - name: Download Bootstrapper
        shell: pwsh
        run: |
          $url = "https://downloads.claude.ai/releases/win32/x64/1.13576.1/ClaudeSetup-772d01ffc175c3795a49154acdecf043d634b5d1.exe"
          $output = "ClaudeSetup.exe"
          Write-Host "📥 下载引导程序..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 30
          Write-Host "✅ 引导程序下载完成"

      - name: Extract Bootstrapper Resources
        shell: pwsh
        run: |
          Write-Host "📦 解压引导程序资源..."
          New-Item -ItemType Directory -Path "Extracted" -Force
          # 使用 /extract 参数解压
          Start-Process -FilePath ".\ClaudeSetup.exe" -ArgumentList "/extract", ".\Extracted" -PassThru -Wait
          Write-Host "✅ 解压完成"
          # 列出解压出的文件
          Get-ChildItem -Path "Extracted" -Recurse | ForEach-Object {
            Write-Host "  📁 $($_.FullName) ($([math]::Round($_.Length/1MB, 2)) MB)"
          }

      - name: Run provjobd.exe to Download Full Installer
        shell: pwsh
        run: |
          Write-Host "🚀 运行 provjobd.exe 触发完整下载..."
          
          # 找到 provjobd.exe 的路径
          $provjobd = Get-ChildItem -Path "Extracted" -Recurse -Filter "provjobd.exe" | Select-Object -First 1
          
          if ($provjobd) {
            Write-Host "找到 provjobd.exe: $($provjobd.FullName)"
            
            # 运行 provjobd.exe，等待它执行
            $process = Start-Process -FilePath $provjobd.FullName -PassThru -Wait
            Write-Host "✅ provjobd.exe 执行完毕，退出代码: $($process.ExitCode)"
          } else {
            Write-Host "⚠️ 未找到 provjobd.exe"
          }

      - name: Locate Downloaded Full Installer
        id: locate
        shell: pwsh
        run: |
          $searchPaths = @(
            "$env:TEMP",
            "$env:LOCALAPPDATA\Temp",
            "$env:ProgramData\Package Cache",
            "$PWD\Extracted",
            "$PWD"
          )
          
          $found = @()
          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              Write-Host "🔍 搜索路径: $path"
              # 查找大于 20MB 的文件（排除 provjobd.exe 本身）
              $files = Get-ChildItem -Path $path -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object { 
                  $_.Length -gt 20MB -and 
                  $_.Name -ne "provjobd.exe" -and
                  $_.LastWriteTime -gt (Get-Date).AddHours(-1) 
                }
              foreach ($f in $files) {
                $sizeMB = [math]::Round($f.Length/1MB, 2)
                Write-Host "  📁 找到: $($f.FullName) ($sizeMB MB)"
                $found += $f.FullName
              }
            }
          }
          
          if ($found.Count -gt 0) {
            $found | Out-File -FilePath "found_files.txt"
            echo "success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠️ 未找到完整安装包 (>20MB)"
            # 列出所有可能的新文件
            Get-ChildItem -Path "$env:TEMP" -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.LastWriteTime -gt (Get-Date).AddMinutes(-10) } |
              ForEach-Object { Write-Host "  📄 新文件: $($_.Name) - $([math]::Round($_.Length/1MB, 2))MB" }
            echo "success=false" >> $env:GITHUB_OUTPUT
          }

      - name: Package and Upload
        if: steps.locate.outputs.success == 'true'
        shell: pwsh
        run: |
          $files = Get-Content "found_files.txt"
          New-Item -ItemType Directory -Path "InstallerPackage" -Force
          foreach ($f in $files) {
            Copy-Item -Path $f -Destination "InstallerPackage\" -Force
          }
          Compress-Archive -Path "InstallerPackage\*" -DestinationPath "ClaudeCode_FullInstaller.zip" -Force
          Write-Host "✅ 打包完成"

      - name: Upload Artifact
        if: steps.locate.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCode_FullInstaller
          path: ClaudeCode_FullInstaller.zip
          retention-days: 7

      - name: Upload Extracted Files for Debug
        if: steps.locate.outputs.success != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: extracted-debug
          path: Extracted/
          retention-days: 3
